<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metes — 커리큘럼</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" media="print" onload="this.media='all'">
<link rel="stylesheet" href="css/style.css?v=66">
</head>
<body data-page="curriculum">

<div id="support-badge"></div>
<nav id="site-nav"></nav>

<section class="page-hero" id="page-hero"></section>

<!-- SESSION STRUCTURE -->
<div data-section="session" style="background:#f5f4f0;">
  <div class="page">
    <div class="cur-section">
      <div class="cur-left">
        <h2 class="mem-heading" data-text="curriculum.session.title"></h2>
      </div>
      <div class="cur-right" id="session-cards"></div>
    </div>
  </div>
</div>

<!-- LEARNING BLOCKS -->
<div data-section="program" style="background: var(--lavender); padding: 56px 0;">
  <div class="page">
    <div class="cur-section" style="padding-top:0;">
      <div class="cur-left">
        <h2 class="mem-heading" data-text="curriculum.program.title"></h2>
        <p class="mem-desc" data-text="curriculum.program.desc"></p>
      </div>
      <div class="cur-right" id="learning-blocks"></div>
    </div>
  </div>
</div>

<!-- COST -->
<div data-section="cost" style="background:#f5f4f0;">
  <div class="page">
    <div class="cur-section">
      <div class="cur-left">
        <h2 class="mem-heading" data-text="curriculum.cost.title"></h2>
      </div>
      <div class="cur-right">
        <div class="cur-fee-list" id="cur-fee-list"></div>
      </div>
    </div>
  </div>
</div>

<footer id="site-footer"></footer>

<script src="js/data.js?v=66"></script>
<script src="js/components.js?v=66"></script>
<script src="js/main.js?v=66"></script>
</body>
</html>
