<!-- SESSION STRUCTURE -->

      </div>

    </div>
  </div>
</div>

<!-- LEARNING BLOCKS -->

    <div class="cur-section" style="padding-top:0;">
      <div class="cur-left">

    </div>
  </div>

<!-- 그 외 -->
<div style="background:#f5f4f0;">

            </div>
          </div>
