<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metes — 소식지</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" media="print" onload="this.media='all'">
<link rel="stylesheet" href="css/style.css?v=72">
</head>
<body data-page="news">

<div id="support-badge"></div>
<nav id="site-nav"></nav>

<section class="page-hero" id="page-hero"></section>

<!-- TOP: Article detail -->
<div style="background:#f5f4f0;">
  <div class="page">
    <div class="news-layout">

      <!-- Left label -->
      <div class="news-left">
        <h2 class="mem-heading">Maker<br>News</h2>
      </div>

      <!-- Right article -->
      <div class="news-article" id="news-article-content"></div>

    </div>
  </div>
</div>

<!-- BOTTOM: News list -->
<div style="background: var(--lavender); padding: 64px 0 72px;">
  <div class="page">
    <div class="news-list-layout">

      <div class="news-list-left" style="position: relative;">
        <h2 class="mem-heading">News<br>Lists</h2>
        <div class="news-cta" id="news-cta">
          <span data-text="news.cta.title"></span><br>
          <strong data-text="news.cta.desc"></strong>
        </div>
      </div>

      <div class="news-list-right">
        <div class="news-grid" id="news-grid"></div>
        <div class="news-pagination-wrap">
          <div class="news-pagination" id="news-pagination"></div>
        </div>
      </div>
  </div>
</div>

<footer id="site-footer"></footer>

<script src="js/data.js?v=72"></script>
<script src="js/components.js?v=72"></script>
<script src="js/main.js?v=72"></script>
</body>
</html>
